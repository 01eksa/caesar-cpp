name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          strip build/caesar-cpp
      - uses: actions/upload-artifact@v4
        with:
          name: linux-bin
          path: build/caesar-cpp

  build-linux-arm:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          strip build/caesar-cpp
      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm-bin
          path: build/caesar-cpp

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM
        run: |
          choco install llvm --confirm
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Build
        shell: bash
        run: |
          cmake -B build \
            -G "Ninja" \
            -DCMAKE_C_COMPILER="C:/Program Files/LLVM/bin/clang.exe" \
            -DCMAKE_CXX_COMPILER="C:/Program Files/LLVM/bin/clang++.exe" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-bin
          path: build/caesar-cpp.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          strip build/caesar-cpp
      - uses: actions/upload-artifact@v4
        with:
          name: macos-bin
          path: build/caesar-cpp

  release:
    permissions:
      contents: write
    needs: [ build-linux, build-linux-arm, build-windows, build-macos ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Zip artifacts
        run: |
          zip -j caesar-cpp_linux_x64_${{ github.ref_name }}.zip artifacts/linux-bin/caesar-cpp text/1MiB.txt
          zip -j caesar-cpp_linux_arm64_${{ github.ref_name }}.zip artifacts/linux-arm-bin/caesar-cpp text/1MiB.txt
          zip -j caesar-cpp_win_x64_${{ github.ref_name }}.zip artifacts/windows-bin/caesar-cpp.exe text/1MiB.txt
          zip -j caesar-cpp_macos_${{ github.ref_name }}.zip artifacts/macos-bin/caesar-cpp text/1MiB.txt
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            caesar-cpp_linux_x64_${{ github.ref_name }}.zip
            caesar-cpp_linux_arm64_${{ github.ref_name }}.zip
            caesar-cpp_win_x64_${{ github.ref_name }}.zip
            caesar-cpp_macos_${{ github.ref_name }}.zip
          generate_release_notes: true